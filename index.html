<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  #canvas {
    display: block;
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100dvh;
    touch-action: none;
  }
</style>
<title>webgpu mandelbrot</title>
</head>

<body>
<canvas id="canvas"></canvas>
<script type="module">
import init from './pkg/mbrot.js';

if (!navigator.gpu) {
  alert("webgpu not supported"); 
} else {
  init();
}
</script>

</body>
</html>
